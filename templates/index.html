<<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Gerador de Orçamentos</title>
</head>
<body>
    <div class="container">
        <h1>Gerador de Orçamentos</h1>
        <h2>{{ empresa.nome }}</h2>

        <form action="/verificar" method="post">
            <label for="cliente_nome">Nome do Cliente:</label>
            <input type="text" id="cliente_nome" name="cliente_nome" required>

            <label for="data_orcamento">Data do Orçamento:</label>
            <input type="text" id="data_orcamento" name="data_orcamento" value="{{ data_hoje }}" required>

        <div class="label-com-botao">
            <label for="servicos_inclusos">Serviços Inclusos (um por linha):</label>
            <button type="button" id="btn-mic" title="Usar ditado por voz">🎤</button>
        </div>
            <small class="mic-instruction">Ou clique no microfone para falar</small>
            <textarea id="servicos_inclusos" name="servicos_inclusos" rows="6" required placeholder="Ex: Instalação do motor principal&#10;Manutenção do sistema de refrigeração"></textarea>

            <label for="valor_total">Valor Total (R$):</label>
            <input type="text" id="valor_total" name="valor_total" placeholder="Ex: 1500,00" required>

            <label for="forma_pagamento">Forma de Pagamento:</label>
            <input type="text" id="forma_pagamento" name="forma_pagamento" value="A combinar" required>

            <button type="submit">Verificar e Gerar Orçamento (.PDF)</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
            <a href="{{ url_for('historico') }}" style="color: var(--cor-primaria); font-weight: bold; text-decoration: none;">Ver Histórico de Orçamentos</a>
        </div>
    </div>
    <script>
    // Verifica se o navegador suporta a Web Speech API
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micButton = document.getElementById('btn-mic');
    const servicesTextarea = document.getElementById('servicos_inclusos');
    const campoValor = document.getElementById('valor_total');
    if (campoValor) {
        campoValor.addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, ''); // Tira tudo que não é número
            if (valor === '') {
                e.target.value = '';
                return;
            }
            valor = (parseInt(valor) / 100).toFixed(2) + '';
            valor = valor.replace('.', ',');
            valor = valor.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
            e.target.value = valor;
        });
    }

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        let isRecognizing = false;

        // Configurações do reconhecimento de voz
        recognition.continuous = true;
        recognition.lang = 'pt-BR';
        recognition.interimResults = true;


        // ##### FUNÇÃO PARA PROCESSAR COMANDOS DE VOZ AQUI #####
    
        function processarComandos(texto) {
            let textoProcessado = texto;
            // Usei expressões regulares (regex) para substituir os comandos
            // O 'gi' no final significa 'global' (substituir todas as ocorrências) e 'case-insensitive' (ignorar maiúsculas/minúsculas)
            textoProcessado = textoProcessado.replace(/\s+vírgula/gi, ',');
            textoProcessado = textoProcessado.replace(/\s+ponto/gi, '.');
            textoProcessado = textoProcessado.replace(/\s+ponto de interrogação/gi, '?');
            textoProcessado = textoProcessado.replace(/\s+ponto de exclamação/gi, '!');
            textoProcessado = textoProcessado.replace(/nova linha/gi, '\n');
            textoProcessado = textoProcessado.replace(/próxima linha/gi, '\n');
            return textoProcessado;
        }


        // Evento de clique no botão do microfone
        micButton.addEventListener('click', () => {
            if (!isRecognizing) {
                // Se o campo já tiver texto, começamos a adicionar a partir dele
                finalTranscript = servicesTextarea.value;
                recognition.start();
            } else {
                recognition.stop();
            }
        });

        // Quando o reconhecimento começa
        recognition.onstart = () => {
            isRecognizing = true;
            micButton.textContent = '🔴';
            micButton.classList.add('recording');
            console.log('Reconhecimento de voz iniciado.');
        };

        // Quando o reconhecimento termina
        recognition.onend = () => {
            isRecognizing = false;
            micButton.textContent = '🎤';
            micButton.classList.remove('recording');
            console.log('Reconhecimento de voz terminado.');
        };

        // Quando um erro acontece
        recognition.onerror = (event) => {
            console.error('Erro no reconhecimento de voz:', event.error);
            if (event.error !== 'no-speech') {
                alert(`Erro no reconhecimento de voz: ${event.error}`);
            }
        };

        let finalTranscript = servicesTextarea.value;

        // Quando o navegador captura alguma fala
        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                let transcriptPart = event.results[i][0].transcript;

                if (event.results[i].isFinal) {
                    //  Processar o texto final com a nova função =====
                    let textoProcessado = processarComandos(transcriptPart.trim());
                    
                    // Adiciona ao transcrito final, capitalizando a primeira letra após um ponto ou quebra de linha
                    if (finalTranscript.endsWith('. ') || finalTranscript.endsWith('\n') || finalTranscript === '') {
                        textoProcessado = textoProcessado.charAt(0).toUpperCase() + textoProcessado.slice(1);
                    }
                    finalTranscript += (finalTranscript.endsWith('\n') || finalTranscript === '' ? '' : ' ') + textoProcessado;

                } else {
                    interimTranscript += transcriptPart;
                }
            }
    
            servicesTextarea.value = finalTranscript.replace(/\n /g, '\n') + (interimTranscript ? ' ' + interimTranscript : '');
        };

    } else {
        // Se o navegador não suportar a API, esconde o botão
        console.log('Este navegador não suporta a Web Speech API.');
        micButton.style.display = 'none';
    }
</script>
</body>
</html>
